services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_ENDPOINT: https://hf-mirror.com
      DB_ENGINE: sqlite
    volumes:
      - storage_data:/data
      - whisper_cache:/root/.cache/huggingface
      - sqlite_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  storage_data:
  whisper_cache:
  sqlite_data:
